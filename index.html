<!DOCTYPE html>
<html>
<head>
  <title>LED Control</title>
</head>

<body style="text-align:center; margin-top:50px;">

<h1>LED Control</h1>

<button onclick="sendData('LED 1')">LED 1</button>
<button onclick="sendData('LED 2')">LED 2</button>

<p id="status">Waiting...</p>

<script>
function sendData(value) {

  document.getElementById("status").innerHTML = value + " sent";

  fetch("https://led-control-nfc-default-rtdb.firebaseio.com/queue.json", {
    method: "POST",
    body: JSON.stringify(value)
  });

}
</script>

</body>
</html>
