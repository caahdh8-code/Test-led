<!DOCTYPE html>
<html>
<head>
  <title>LED Control</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 50px;
      background: linear-gradient(to right, #6a0dad, #b19cd9);
      color: white;
    }

    button {
      padding: 20px 40px;
      font-size: 20px;
      margin: 15px;
      border: none;
      border-radius: 10px;
      background-color: #800080;
      color: white;
      cursor: pointer;
    }

    #status {
      margin-top: 30px;
      font-size: 24px;
    }
  </style>
</head>

<body>

<h1>LED Control System</h1>
<h3>Select LED</h3>

<button onclick="led1()">LED 1</button>
<button onclick="led2()">LED 2</button>

<div id="status">Status: None</div>

<script>
function led1() {
  document.getElementById("status").innerHTML = "LED 1 ON";
}

function led2() {
  document.getElementById("status").innerHTML = "LED 2 ON";
}
</script>

</body>
</html>
