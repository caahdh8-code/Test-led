<!DOCTYPE html>
<html>
<head>
  <title>LED Control</title>

  <style>
    body {
      text-align: center;
      font-family: Arial;
      margin-top: 60px;
      background: linear-gradient(to right, #6a0dad, #b19cd9);
      color: white;
    }

    h1 {
      font-size: 40px;
    }

    button {
      padding: 20px 40px;
      font-size: 20px;
      margin: 15px;
      border: none;
      border-radius: 12px;
      background-color: #800080;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #a020f0;
      transform: scale(1.1);
    }

    #status {
      margin-top: 30px;
      font-size: 24px;
      color: #ffe6ff;
    }
  </style>
</head>

<body>

<h1>LED Control System</h1>
<h3>Select LED</h3>

<button onclick="led1()">LED 1</button>
<button onclick="led2()">LED 2</button>

<div id="status">Status: None</div>

<script>
function led1() {
  document.getElementById("status").innerHTML = "LED 1 ON (30 seconds)";

  setTimeout(function() {
    document.getElementById("status").innerHTML = "LED 1 OFF";
  }, 30000);
}

function led2() {
  document.getElementById("status").innerHTML = "LED 2 ON (30 seconds)";

  setTimeout(function() {
    document.getElementById("status").innerHTML = "LED 2 OFF";
  }, 30000);
}
</script>

</body>
</html>
